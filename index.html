<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子发票智能管理系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <div id="toastContainer" class="toast-container"></div>
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M9 13H15M12 10V16M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z"
                            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <h1>电子发票识别</h1>
            </div>
            <div class="user-profile">
                <span class="avatar">YH</span>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Stats Grid -->
            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue-bg">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">本月累计</span>
                        <span class="stat-value">1,284</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green-bg">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">查验通过</span>
                        <span class="stat-value">1,256</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange-bg">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">异常拦截</span>
                        <span class="stat-value">28</span>
                    </div>
                </div>

            </section>

            <!-- Upload Area -->
            <section class="upload-section" id="dropZone">
                <input type="file" id="fileInput" multiple accept="image/*,.pdf" hidden>
                <div class="upload-content">
                    <div class="upload-icon-wrapper">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <h3>点击或拖拽发票文件至此</h3>
                    <p>支持 JPG, PNG, PDF 格式，支持批量上传查验</p>
                </div>
            </section>

            <!-- Invoice List -->
            <section class="table-section">
                <div class="section-header">
                    <h2>最近上传</h2>
                    <div class="actions">
                        <button class="btn-text">导出记录</button>
                    </div>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th width="80">预览</th>
                                <th>发票代码/号码</th>
                                <th>扫描结果</th>
                                <th>查验状态</th>
                                <th width="100">操作</th>
                            </tr>
                        </thead>
                        <tbody id="invoiceTableBody">
                            <!-- Initial Data Rows will be inserted by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Preview Drawer / Modal -->
    <div class="drawer-overlay" id="drawerOverlay">
        <div class="drawer">
            <div class="drawer-header">
                <h3>发票详情</h3>
                <button class="close-btn" id="closeDrawer">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="drawer-content">
                <div class="preview-container">
                    <div class="invoice-preview" id="invoicePreview">
                        <!-- Preview Image/Canvas will be here -->
                        <div class="watermark-stamp" id="watermarkStamp">
                            <div class="stamp-inner">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                                <span>查验通过</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="invoice-meta">
                    <div class="meta-group">
                        <label>发票代码</label>
                        <div class="meta-value copy-able" id="metaCode">-</div>
                    </div>
                    <div class="meta-group">
                        <label>发票号码</label>
                        <div class="meta-value copy-able" id="metaNumber">-</div>
                    </div>
                    <div class="meta-group">
                        <label>开票日期</label>
                        <div class="meta-value" id="metaDate">-</div>
                    </div>
                </div>

                <div class="result-card">
                    <h4>查验结果</h4>
                    <div class="result-tags">
                        <span class="tag tag-amount">¥ 1,280.00</span>
                        <span class="tag tag-company">京东世纪贸易有限公司</span>
                        <span class="tag tag-date">常规增值税普通发票</span>
                    </div>
                </div>
            </div>
            <div class="drawer-footer">
                <button class="btn-secondary">下载文件</button>
                <button class="btn-primary">重新查验</button>
            </div>
        </div>
    </div>

    <!-- Templates for JS -->
    <template id="scanningRowTemplate">
        <tr class="scanning-row">
            <td>
                <div class="thumb-loading">
                    <div class="skeleton-img"></div>
                    <div class="scan-line"></div>
                </div>
            </td>
            <td>
                <div class="skeleton-text w-120"></div>
                <div class="skeleton-text w-80 mt-1"></div>
            </td>
            <td>
                <div class="skeleton-tag w-60"></div>
                <div class="skeleton-tag w-80 ml-1"></div>
            </td>
            <td>
                <span class="status-badge processing">
                    <span class="pulse-dot"></span>
                    查验中...
                </span>
            </td>
            <td>-</td>
        </tr>
    </template>

    <script src="app.js"></script>
</body>

</html>
